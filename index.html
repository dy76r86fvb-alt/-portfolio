<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>资产监控</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080A0F;
    --surface: #0F1218;
    --surface2: #151A22;
    --border: #1E2530;
    --teal: #00E5C0;
    --orange: #FF8C00;
    --green: #39FF6E;
    --red: #FF4466;
    --muted: #3A4555;
    --text: #C8D6E5;
    --dim: #566370;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Noto Sans SC’, sans-serif;
min-height: 100vh;
padding: 24px 16px 60px;
background-image:
radial-gradient(ellipse 60% 40% at 80% 10%, rgba(0,229,192,0.04) 0%, transparent 60%),
radial-gradient(ellipse 50% 30% at 10% 90%, rgba(255,140,0,0.04) 0%, transparent 60%);
}

/* HEADER */
.header {
display: flex;
align-items: flex-start;
justify-content: space-between;
margin-bottom: 28px;
}
.header-left .eyebrow {
font-family: ‘Space Mono’, monospace;
font-size: 9px;
letter-spacing: 3px;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 6px;
}
.header-left .total {
font-family: ‘Space Mono’, monospace;
font-size: 28px;
font-weight: 700;
color: #fff;
letter-spacing: -1px;
}
.header-left .subtitle {
font-size: 11px;
color: var(–dim);
margin-top: 4px;
}
.refresh-btn {
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
color: var(–teal);
font-family: ‘Space Mono’, monospace;
font-size: 10px;
padding: 8px 12px;
cursor: pointer;
display: flex;
align-items: center;
gap: 6px;
transition: all 0.2s;
white-space: nowrap;
}
.refresh-btn:hover { background: var(–border); }
.refresh-btn.spinning .icon { display: inline-block; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.icon { display: inline-block; }

/* STATUS BAR */
.status-bar {
display: flex;
align-items: center;
gap: 8px;
margin-bottom: 20px;
font-family: ‘Space Mono’, monospace;
font-size: 9px;
color: var(–dim);
}
.status-dot {
width: 6px; height: 6px;
border-radius: 50%;
background: var(–green);
animation: pulse 2s infinite;
}
@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.3; }
}

/* PIE CHART */
.chart-section {
display: flex;
align-items: center;
gap: 20px;
margin-bottom: 24px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 16px;
padding: 20px;
}
.pie-wrap { position: relative; flex-shrink: 0; width: 110px; height: 110px; }
.pie-wrap svg { transform: rotate(-90deg); }
.pie-center {
position: absolute; top: 50%; left: 50%;
transform: translate(-50%, -50%);
text-align: center;
}
.pie-center .pct { font-family: ‘Space Mono’, monospace; font-size: 9px; color: var(–dim); display: block; }
.pie-center .val { font-family: ‘Space Mono’, monospace; font-size: 13px; font-weight: 700; color: #fff; }
.pie-legend { flex: 1; }
.pie-legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.pie-legend-item:last-child { margin-bottom: 0; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.legend-info { flex: 1; }
.legend-name { font-size: 11px; color: var(–dim); margin-bottom: 2px; }
.legend-val { font-family: ‘Space Mono’, monospace; font-size: 13px; font-weight: 700; color: #fff; }
.legend-pct { font-family: ‘Space Mono’, monospace; font-size: 11px; }

/* SECTION */
.section { margin-bottom: 16px; }
.section-header {
display: flex;
align-items: center;
justify-content: space-between;
padding: 14px 16px;
background: var(–surface);
border: 1px solid var(–border);
border-radius: 12px 12px 0 0;
cursor: pointer;
user-select: none;
}
.section-header-left { display: flex; align-items: center; gap: 10px; }
.section-dot { width: 10px; height: 10px; border-radius: 50%; }
.section-name { font-size: 13px; color: var(–dim); }
.section-total { font-family: ‘Space Mono’, monospace; font-size: 15px; font-weight: 700; color: #fff; }
.section-pct { font-family: ‘Space Mono’, monospace; font-size: 14px; font-weight: 700; }
.section-chevron { font-size: 10px; color: var(–muted); transition: transform 0.2s; }
.section.collapsed .section-chevron { transform: rotate(-90deg); }
.section.collapsed .items { display: none; }

.items { border: 1px solid var(–border); border-top: none; border-radius: 0 0 12px 12px; overflow: hidden; }
.item {
display: flex;
align-items: center;
padding: 11px 16px 11px 32px;
border-top: 1px solid var(–border);
gap: 10px;
transition: background 0.15s;
}
.item:hover { background: var(–surface2); }
.item-icon { font-size: 14px; width: 22px; text-align: center; flex-shrink: 0; }
.item-info { flex: 1; }
.item-name { font-size: 12px; color: var(–dim); margin-bottom: 1px; }
.item-price { font-family: ‘Space Mono’, monospace; font-size: 10px; color: var(–muted); }
.item-value { font-family: ‘Space Mono’, monospace; font-size: 13px; color: #fff; text-align: right; }
.item-tag {
font-family: ‘Space Mono’, monospace;
font-size: 9px;
padding: 2px 6px;
border-radius: 4px;
background: var(–surface2);
color: var(–muted);
border: 1px solid var(–border);
}
.tag-green { color: var(–green) !important; border-color: rgba(57,255,110,0.2) !important; background: rgba(57,255,110,0.05) !important; }
.tag-red { color: var(–red) !important; border-color: rgba(255,68,102,0.2) !important; background: rgba(255,68,102,0.05) !important; }

/* EDIT MODE */
.edit-btn {
position: fixed;
bottom: 20px;
right: 20px;
background: var(–teal);
color: #000;
border: none;
border-radius: 50px;
padding: 12px 20px;
font-family: ‘Space Mono’, monospace;
font-size: 11px;
font-weight: 700;
cursor: pointer;
box-shadow: 0 4px 24px rgba(0,229,192,0.3);
transition: all 0.2s;
z-index: 100;
}
.edit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,229,192,0.4); }

/* MODAL */
.modal-overlay {
display: none;
position: fixed;
inset: 0;
background: rgba(0,0,0,0.8);
z-index: 200;
align-items: flex-end;
justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 20px 20px 0 0;
padding: 24px 20px 40px;
width: 100%;
max-width: 480px;
max-height: 80vh;
overflow-y: auto;
}
.modal h3 {
font-family: ‘Space Mono’, monospace;
font-size: 13px;
color: var(–teal);
margin-bottom: 20px;
letter-spacing: 1px;
}
.modal-grid { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.modal-row { display: flex; align-items: center; gap: 12px; }
.modal-row label { font-size: 12px; color: var(–dim); width: 140px; flex-shrink: 0; }
.modal-row input {
flex: 1;
background: var(–surface2);
border: 1px solid var(–border);
border-radius: 8px;
color: #fff;
font-family: ‘Space Mono’, monospace;
font-size: 12px;
padding: 8px 12px;
outline: none;
transition: border-color 0.2s;
}
.modal-row input:focus { border-color: var(–teal); }
.modal-actions { display: flex; gap: 10px; }
.btn-save {
flex: 1;
background: var(–teal);
color: #000;
border: none;
border-radius: 8px;
padding: 12px;
font-family: ‘Space Mono’, monospace;
font-size: 11px;
font-weight: 700;
cursor: pointer;
}
.btn-cancel {
flex: 1;
background: var(–surface2);
color: var(–dim);
border: 1px solid var(–border);
border-radius: 8px;
padding: 12px;
font-family: ‘Space Mono’, monospace;
font-size: 11px;
cursor: pointer;
}
.divider { height: 1px; background: var(–border); margin: 16px 0; }
.modal-section-label {
font-family: ‘Space Mono’, monospace;
font-size: 9px;
letter-spacing: 2px;
color: var(–muted);
text-transform: uppercase;
margin-bottom: 12px;
}
</style>

</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="eyebrow">MY PORTFOLIO</div>
    <div class="total" id="totalDisplay">¥ —</div>
    <div class="subtitle" id="lastUpdate">正在加载...</div>
  </div>
  <button class="refresh-btn" onclick="fetchPrices(true)">
    <span class="icon" id="refreshIcon">↻</span>
    <span>刷新</span>
  </button>
</div>

<div class="status-bar">
  <div class="status-dot"></div>
  <span id="statusText">币圈价格实时更新 · 美股手动输入</span>
</div>

<!-- PIE CHART -->

<div class="chart-section">
  <div class="pie-wrap">
    <svg width="110" height="110" viewBox="0 0 110 110">
      <circle cx="55" cy="55" r="42" fill="none" stroke="#1E2530" stroke-width="18"/>
      <circle cx="55" cy="55" r="42" fill="none" stroke="#00E5C0" stroke-width="18"
        id="pieStock" stroke-dasharray="0 263.9" stroke-dashoffset="0"/>
      <circle cx="55" cy="55" r="42" fill="none" stroke="#FF8C00" stroke-width="18"
        id="pieCrypto" stroke-dasharray="0 263.9" stroke-dashoffset="0"/>
    </svg>
    <div class="pie-center">
      <span class="pct">总资产</span>
      <span class="val" id="pieTotalVal">—</span>
    </div>
  </div>
  <div class="pie-legend">
    <div class="pie-legend-item">
      <div class="legend-dot" style="background:#00E5C0"></div>
      <div class="legend-info">
        <div class="legend-name">🇺🇸 美股基金</div>
        <div class="legend-val" id="stockTotalDisplay">¥—</div>
      </div>
      <div class="legend-pct" style="color:#00E5C0" id="stockPctDisplay">—%</div>
    </div>
    <div class="pie-legend-item">
      <div class="legend-dot" style="background:#FF8C00"></div>
      <div class="legend-info">
        <div class="legend-name">🪙 币圈资产</div>
        <div class="legend-val" id="cryptoTotalDisplay">¥—</div>
      </div>
      <div class="legend-pct" style="color:#FF8C00" id="cryptoPctDisplay">—%</div>
    </div>
  </div>
</div>

<!-- 美股 -->

<div class="section" id="stockSection">
  <div class="section-header" onclick="toggleSection('stockSection')">
    <div class="section-header-left">
      <div class="section-dot" style="background:#00E5C0"></div>
      <div>
        <div class="section-name">美股基金 + 余额宝</div>
        <div class="section-total" id="stockSectionTotal">¥—</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="section-pct" style="color:#00E5C0" id="stockSectionPct">—%</div>
      <div class="section-chevron">▼</div>
    </div>
  </div>
  <div class="items" id="stockItems"></div>
</div>

<!-- 币圈 -->

<div class="section" id="cryptoSection">
  <div class="section-header" onclick="toggleSection('cryptoSection')">
    <div class="section-header-left">
      <div class="section-dot" style="background:#FF8C00"></div>
      <div>
        <div class="section-name">币圈资产</div>
        <div class="section-total" id="cryptoSectionTotal">¥—</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="section-pct" style="color:#FF8C00" id="cryptoSectionPct">—%</div>
      <div class="section-chevron">▼</div>
    </div>
  </div>
  <div class="items" id="cryptoItems"></div>
</div>

<button class="edit-btn" onclick="openModal()">✎ 编辑持仓</button>

<!-- MODAL -->

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>编辑持仓</h3>

```
<div class="modal-section-label">🇺🇸 美股基金（人民币）</div>
<div class="modal-grid" id="stockInputs"></div>

<div class="divider"></div>

<div class="modal-section-label">🪙 币圈（持币数量）</div>
<div class="modal-grid" id="cryptoInputs"></div>

<div class="divider"></div>

<div class="modal-section-label">⚙️ 汇率设置</div>
<div class="modal-grid">
  <div class="modal-row">
    <label>美元兑人民币</label>
    <input type="number" id="inputUsdRate" step="0.01" placeholder="7.2">
  </div>
</div>

<div class="divider"></div>
<div class="modal-actions">
  <button class="btn-cancel" onclick="closeModal()">取消</button>
  <button class="btn-save" onclick="saveAndClose()">保存并刷新</button>
</div>

  </div>

<script>
// ─── DEFAULT HOLDINGS ───────────────────────────────────────────
let holdings = JSON.parse(localStorage.getItem('holdings') || 'null') || {
  usdRate: 7.2,
  stocks: [
    { name: '华安纳斯达克100 ETF', icon: '📈', value: 353.49, gain: '+7.58%' },
    { name: '摩根标普500',         icon: '📈', value: 382.59, gain: '+3.81%' },
    { name: '广发纳斯达克100 ETF', icon: '📈', value: 108.13, gain: '+8.13%' },
    { name: '易方达标普500',       icon: '📈', value: 84.04,  gain: '+5.05%' },
    { name: '余额宝',              icon: '🏦', value: 30.55,  gain: '活期'   },
  ],
  crypto: [
    { symbol: 'BTC',   icon: '₿',  qty: 0.00044249 },
    { symbol: 'ETH',   icon: 'Ξ',  qty: 0.00649104 },
    { symbol: 'USDT',  icon: '💵', qty: 30.96545124 },
    { symbol: 'SOL',   icon: '◎',  qty: 0.11253588  },
    { symbol: 'BNB',   icon: '🔶', qty: 0.01015393  },
    { symbol: 'PEPE',  icon: '🐸', qty: 1482370.578 },
    { symbol: 'PENGU', icon: '🐧', qty: 642.509     },
    { symbol: 'AAVE',  icon: '👻', qty: 0.05195041  },
    { symbol: 'DOGE',  icon: '🐕', qty: 26.97437279 },
  ]
};

let cryptoPrices = {};

// ─── FETCH PRICES ────────────────────────────────────────────────
async function fetchPrices(manual = false) {
  const btn = document.querySelector('.refresh-btn');
  btn.classList.add('spinning');
  document.getElementById('refreshIcon').textContent = '↻';

  const symbols = holdings.crypto
    .filter(c => c.symbol !== 'USDT')
    .map(c => c.symbol + 'USDT');

  try {
    const results = await Promise.all(
      symbols.map(s =>
        fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${s}`)
          .then(r => r.json())
          .catch(() => null)
      )
    );
    results.forEach(r => {
      if (r && r.symbol && r.price) {
        const sym = r.symbol.replace('USDT', '');
        cryptoPrices[sym] = parseFloat(r.price);
      }
    });
    cryptoPrices['USDT'] = 1;

    const now = new Date();
    document.getElementById('lastUpdate').textContent =
      `最后更新：${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
    document.getElementById('statusText').textContent = '币圈价格实时更新 · 美股手动输入';
    render();
  } catch(e) {
    document.getElementById('statusText').textContent = '⚠ 价格获取失败，显示上次数据';
  }

  btn.classList.remove('spinning');
  document.getElementById('refreshIcon').textContent = '↻';
}

// ─── RENDER ──────────────────────────────────────────────────────
function render() {
  const rate = holdings.usdRate;

  // Stock total
  const stockTotal = holdings.stocks.reduce((s, x) => s + x.value, 0);

  // Crypto total
  let cryptoTotal = 0;
  holdings.crypto.forEach(c => {
    const price = cryptoPrices[c.symbol] || 0;
    cryptoTotal += c.qty * price * rate;
  });

  const grandTotal = stockTotal + cryptoTotal;
  const stockPct = grandTotal ? (stockTotal / grandTotal * 100).toFixed(1) : 0;
  const cryptoPct = grandTotal ? (cryptoTotal / grandTotal * 100).toFixed(1) : 0;

  // Header
  document.getElementById('totalDisplay').textContent = '¥ ' + grandTotal.toFixed(0);
  document.getElementById('pieTotalVal').textContent = '¥' + grandTotal.toFixed(0);

  // Legend
  document.getElementById('stockTotalDisplay').textContent = '¥' + stockTotal.toFixed(2);
  document.getElementById('cryptoTotalDisplay').textContent = '¥' + cryptoTotal.toFixed(2);
  document.getElementById('stockPctDisplay').textContent = stockPct + '%';
  document.getElementById('cryptoPctDisplay').textContent = cryptoPct + '%';
  document.getElementById('stockSectionTotal').textContent = '¥' + stockTotal.toFixed(2);
  document.getElementById('cryptoSectionTotal').textContent = '¥' + cryptoTotal.toFixed(2);
  document.getElementById('stockSectionPct').textContent = stockPct + '%';
  document.getElementById('cryptoSectionPct').textContent = cryptoPct + '%';

  // Pie chart (circumference = 2π×42 = 263.9)
  const C = 263.9;
  const stockArc = (stockPct / 100) * C;
  const cryptoArc = (cryptoPct / 100) * C;
  document.getElementById('pieStock').setAttribute('stroke-dasharray', `${stockArc} ${C}`);
  document.getElementById('pieCrypto').setAttribute('stroke-dasharray', `${cryptoArc} ${C}`);
  document.getElementById('pieCrypto').setAttribute('stroke-dashoffset', `-${stockArc}`);

  // Stock items
  const stockEl = document.getElementById('stockItems');
  stockEl.innerHTML = holdings.stocks.map(s => {
    const isGain = s.gain.startsWith('+');
    const tagClass = isGain ? 'tag-green' : '';
    return `<div class="item">
      <div class="item-icon">${s.icon}</div>
      <div class="item-info">
        <div class="item-name">${s.name}</div>
      </div>
      <div class="item-value">¥${s.value.toFixed(2)}</div>
      <div class="item-tag ${tagClass}">${s.gain}</div>
    </div>`;
  }).join('');

  // Crypto items
  const cryptoEl = document.getElementById('cryptoItems');
  cryptoEl.innerHTML = holdings.crypto.map(c => {
    const price = cryptoPrices[c.symbol] || 0;
    const usdVal = c.qty * price;
    const cnyVal = usdVal * rate;
    const priceStr = c.symbol === 'USDT' ? '= ¥' + rate.toFixed(2) :
      price > 0 ? '$' + (price < 0.001 ? price.toExponential(3) : price.toLocaleString(undefined, {maximumFractionDigits: 4})) : '获取中...';
    return `<div class="item">
      <div class="item-icon">${c.icon}</div>
      <div class="item-info">
        <div class="item-name">${c.symbol}</div>
        <div class="item-price">${priceStr}</div>
      </div>
      <div class="item-value">¥${cnyVal.toFixed(2)}</div>
      <div class="item-tag">${usdVal.toFixed(2)}U</div>
    </div>`;
  }).join('');
}

// ─── SECTION TOGGLE ──────────────────────────────────────────────
function toggleSection(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

// ─── MODAL ───────────────────────────────────────────────────────
function openModal() {
  // Build stock inputs
  document.getElementById('stockInputs').innerHTML = holdings.stocks.map((s, i) =>
    `<div class="modal-row">
      <label>${s.icon} ${s.name}</label>
      <input type="number" id="stock_${i}" value="${s.value}" step="0.01">
    </div>`
  ).join('');

  // Build crypto inputs
  document.getElementById('cryptoInputs').innerHTML = holdings.crypto.map((c, i) =>
    `<div class="modal-row">
      <label>${c.icon} ${c.symbol}</label>
      <input type="number" id="crypto_${i}" value="${c.qty}" step="any">
    </div>`
  ).join('');

  document.getElementById('inputUsdRate').value = holdings.usdRate;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function saveAndClose() {
  holdings.stocks.forEach((s, i) => {
    const v = parseFloat(document.getElementById(`stock_${i}`).value);
    if (!isNaN(v)) s.value = v;
  });
  holdings.crypto.forEach((c, i) => {
    const v = parseFloat(document.getElementById(`crypto_${i}`).value);
    if (!isNaN(v)) c.qty = v;
  });
  const rate = parseFloat(document.getElementById('inputUsdRate').value);
  if (!isNaN(rate)) holdings.usdRate = rate;

  localStorage.setItem('holdings', JSON.stringify(holdings));
  closeModal();
  fetchPrices();
}

// ─── INIT ─────────────────────────────────────────────────────────
fetchPrices();
// Auto refresh every 30 seconds
setInterval(() => fetchPrices(), 30000);
</script>

</body>
</html>
